# ============================================================
# PERFIL DEFAULT: H2 en memoria
# Arranca sin Docker ni PostgreSQL. Datos se pierden al reiniciar.
# ============================================================
spring:
  application:
    name: distribuidora-huevos
  datasource:
    url: jdbc:h2:mem:distribuidora;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop        # Hibernate crea las tablas desde las entidades
    show-sql: true
    open-in-view: false
    defer-datasource-initialization: true   # El SQL de seed corre DESPUÉS de que Hibernate creó las tablas
  sql:
    init:
      mode: always
      data-locations: classpath:data-h2.sql  # Solo datos iniciales (tablas ya las crea Hibernate)
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

app:
  username: ${APP_USERNAME:admin}
  password: ${APP_PASSWORD:admin123}
  allowed-origin: ${APP_ALLOWED_ORIGIN:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:3d8f2a1b9c4e7f0a2b5d8e1c4f7a0b3d6e9f2a5b8c1d4e7f0a3b6c9d2e5f8a1b}
    expiration: 86400000  # 24 horas

---
# ============================================================
# PERFIL postgres: PostgreSQL real via Docker
# Activar con: -Dspring.profiles.active=postgres
# Requiere: docker-compose up -d
# ============================================================
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/distribuidora_huevos}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    defer-datasource-initialization: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  h2:
    console:
      enabled: false

---
# ============================================================
# PERFIL local: PostgreSQL + SQL visible en consola
# Activar con: -Dspring.profiles.active=local
# ============================================================
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/distribuidora_huevos}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    defer-datasource-initialization: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  h2:
    console:
      enabled: false

---
# ============================================================
# PERFIL prod: Producción real
# Variables de entorno requeridas:
#   DB_URL      → jdbc:postgresql://host:5432/distribuidora_huevos
#   DB_USERNAME → usuario de la base de datos
#   DB_PASSWORD → contraseña de la base de datos
#   PORT        → puerto del servidor (default 8080)
# Activar con: SPRING_PROFILES_ACTIVE=prod
# ============================================================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    defer-datasource-initialization: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  h2:
    console:
      enabled: false

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/css,application/javascript
  error:
    include-message: never
    include-stacktrace: never

# Credenciales sin fallback: el arranque falla si no están configuradas en prod.
# Configurar en Railway: APP_USERNAME, APP_PASSWORD, JWT_SECRET, APP_ALLOWED_ORIGIN
app:
  username: ${APP_USERNAME}
  password: ${APP_PASSWORD}
  allowed-origin: ${APP_ALLOWED_ORIGIN}
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
