[build]
builder = "NIXPACKS"
# 1. Instala pnpm, compila el frontend (sale en src/main/resources/static/)
# 2. Compila el backend con Maven (incluye los estáticos en el JAR)
buildCommand = "export PATH=/tmp/apache-maven-3.9.6/bin:$PATH && corepack enable pnpm && corepack prepare pnpm@8 --activate && cd frontend && pnpm install --frozen-lockfile && pnpm run build && cd .. && mvn package -DskipTests -B"

[deploy]
startCommand = "java -jar target/huevos-1.0.0-SNAPSHOT.jar"
healthcheckPath = "/api/inventario"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[variables]
# Activa el perfil de producción (PostgreSQL real, sin H2)
SPRING_PROFILES_ACTIVE = "prod"
