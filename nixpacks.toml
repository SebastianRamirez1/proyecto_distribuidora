# nixpacks.toml — Builder nativo de Railway
#
# NOTA: No usamos el paquete "maven" de Nix porque arrastra JDK 19
# como dependencia, sobreescribiendo el JDK 21 y rompiendo el build.
# En su lugar descargamos Maven manualmente para que use solo JDK 21.

[phases.setup]
nixPkgs = ["nodejs_20", "jdk21", "curl"]

[phases.install]
cmds = [
  # Descargar Maven 3.9.6 sin dependencias de JDK propias
  "curl -fsSL https://archive.apache.org/dist/maven/maven-3/3.9.6/binaries/apache-maven-3.9.6-bin.tar.gz -o /tmp/mvn.tar.gz && tar -xzf /tmp/mvn.tar.gz -C /tmp",
  # Instalar dependencias del frontend
  "cd frontend && npm install"
]

[phases.build]
cmds = [
  # Compilar React → genera src/main/resources/static/
  "cd frontend && npm run build",
  # Compilar Spring Boot usando Maven con JDK 21 (único JDK instalado)
  "/tmp/apache-maven-3.9.6/bin/mvn package -DskipTests"
]

[start]
cmd = "java -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Dspring.profiles.active=prod -jar target/huevos-1.0.0-SNAPSHOT.jar"
