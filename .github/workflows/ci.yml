name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Permisos mínimos necesarios para que upload-artifact pueda finalizar
permissions:
  contents: read
  actions: write

jobs:
  # ─────────────────────────────────────────
  # JOB 0: Secret scanning (Gitleaks)
  # Corre primero — bloquea si hay credenciales
  # filtradas en el código o en el historial.
  # ─────────────────────────────────────────
  secret-scanning:
    name: Secret Scanning — Gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # historial completo para escanear todos los commits

      - name: Escanear secretos con Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────
  # JOB 1: Backend — compila + tests (H2)
  # ─────────────────────────────────────────
  backend-tests:
    name: Backend — Tests
    runs-on: ubuntu-latest
    needs: secret-scanning

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar tests con Maven (perfil H2)
        run: mvn test -B
        # -B = batch mode, sin colores interactivos
        # Tests usan H2 en memoria (perfil default), no necesitan PostgreSQL

      - name: Subir reporte de tests
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 2: Frontend — build de producción
  # ─────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    needs: secret-scanning

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 8

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Instalar dependencias
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build de producción
        working-directory: frontend
        run: pnpm run build
        # Si el build de Vite falla (import roto, error de sintaxis, etc.) el CI falla

      - name: Subir artefacto del build
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  # ─────────────────────────────────────────
  # JOB 3: SCA — OWASP Dependency Check
  # Escanea dependencias Maven contra CVEs.
  # Falla si hay vulnerabilidad CVSS ≥ 7 (High).
  #
  # Requiere el secret NVD_API_KEY para funcionar
  # de forma fiable (sin él la API de NVD aplica
  # rate limiting y el job puede fallar por timeout).
  # Obtener gratis en: https://nvd.nist.gov/developers/request-an-api-key
  # Agregar en: GitHub → Settings → Secrets → NVD_API_KEY
  # ─────────────────────────────────────────
  dependency-check:
    name: SCA — OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: secret-scanning

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # Cachear la BD de NVD entre runs para evitar re-descargas y rate limits
      - name: Caché base de datos NVD
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check/data
          key: dependency-check-nvd-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            dependency-check-nvd-${{ runner.os }}-

      - name: Ejecutar OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'distribuidora-huevos'
          path: '.'
          format: 'HTML'
          args: "--failOnCVSS 7 --enableRetired${{ secrets.NVD_API_KEY != '' && format(' --nvdApiKey {0}', secrets.NVD_API_KEY) || '' }}"
        # --nvdApiKey se incluye solo si el secret está disponible.
        # En PRs de Dependabot el secret no llega → corre sin clave (usa caché NVD
        # o descarga sin límite aumentado). Solución completa: agregar NVD_API_KEY
        # en GitHub → Settings → Secrets → Dependabot.

      - name: Subir reporte de dependencias
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: ${{ github.workspace }}/reports
          retention-days: 14
