name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Permisos mínimos necesarios para que upload-artifact pueda finalizar
permissions:
  contents: read
  actions: write

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Backend — compila + tests (H2)
  # ─────────────────────────────────────────
  backend-tests:
    name: Backend — Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar tests con Maven (perfil H2)
        run: mvn test -B
        # -B = batch mode, sin colores interactivos
        # Tests usan H2 en memoria (perfil default), no necesitan PostgreSQL

      - name: Subir reporte de tests
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 2: Frontend — build de producción
  # ─────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Instalar dependencias
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build de producción
        working-directory: frontend
        run: pnpm run build
        # Si el build de Vite falla (import roto, error de sintaxis, etc.) el CI falla

      - name: Subir artefacto del build
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3
